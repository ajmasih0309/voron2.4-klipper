## Maker 3D Printing LLC. VoronKits.com Config 12/01/2022
## Voron 2.4R2 CW2 Stealthburner 350

# This file contains the configuration for the VoronKits.com Voron 2.4 R2 350X350X350
# We have added and Changed the following items:
## Added ABL Auto Bed Leveling
## Added Switchless Z Homing. Machine homes using the Omron Probe instead of a manual switch.
## Removed Manual Z Homing Switch
## Added Prime Line On Left Hand side of print surface
## Added Support For Stealthburner LED Lighting
## Configured Stealthburner Extruder Motors
## Configured Safe Z Homing For Probe
## PID Tuned Hotend & Bed Heater
## Added PWM To Bed Heater To Equalize Power To Prevent Flicker In Home Lighting 65HZ USA
## Added and adjusted fans for optimal cooling and quieter operation
## Added Klipper Screen for touchscreen interface and deactivated manual default screens
## Added Do Not Edit Beyond This Point Message above SAVE_CONFIG section.

## If you need help with your configuration file please reach out to your support team 
## at Voronkits.com or email info@voronkits.com please include your name and phone number
## along with your questions.

# This file also contains common pin mappings for the BigTreeTech Octopus V1. as of December 1, 2022.
# To use this config, the firmware should be compiled for the STM32F446 with a "32KiB bootloader"
# Enable "extra low-level configuration options" and select the "12MHz crystal" as clock reference

# after running "make", copy the generated "klipper/out/klipper.bin" file to a
# file named "firmware.bin" on an SD card and then restart the OctoPus with that SD card.

# See docs/Config_Reference.md for a description of parameters.

## Voron Design VORON2 350mm BigTreeTech OctoPus V1 TMC2209 UART config


[include mainsail.cfg]
[exclude_object]
[include KAMP_Settings.cfg]
[include ./KLICKY/klicky-probe.cfg]
[include autoz.cfg]
[include ./macros/*]                  # contains all active macros

#######
# Obsolete cfgs
#######
#[include adxl.cfg]    #Do Not Activate This Is For VoronKits.com Input Shaper Tuning Tool
#[include PIS.cfg]
#[include SHAKEnTUNE.cfg]
#[include DECONTAMINATOR.cfg]


[mcu]
##  Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
##--------------------------------------------------------------------
serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_300026001550335331383520-if00
