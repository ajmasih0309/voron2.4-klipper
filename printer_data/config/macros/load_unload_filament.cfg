[include purge.cfg]
[include spoolman_tracking.cfg]

[gcode_macro LOAD_FILAMENT]
description: Parks over bucket, heats, loads filament, and cleans nozzle
gcode:
    # Set target temperature (default is 230c if not specified)
    {% set TEMP = params.TEMP|default(230)|float %}
    # Set extrusion distance (default is 50mm)
    {% set DISTANCE = params.DISTANCE|default(50)|float %}

    SAVE_GCODE_STATE NAME=LOAD_state
    
    # 1. Park over the purge bucket first
    M117 Parking...
    NOZZLE_PARK_BUCKET
    
    # 2. Heat up hotend if it's below the target temp
    {% if printer.extruder.temperature < TEMP %}
        M117 Heating nozzle...
        M109 S{TEMP} ; Heat and wait
    {% endif %}

    # 3. Load the filament
    M117 Loading filament...
    M83                            ; Set extruder to relative mode
    G1 E{DISTANCE} F300            ; Extrude quickly to the nozzle
    G1 E25 F150                    ; Purge slowly to prime the nozzle
    
    # 4. Wipe the nozzle clean
    M117 Cleaning nozzle...
    NOZZLE_CLEAN
    M117 Filament loaded
    
    # 5. Turn off the heater
    M117 Cooling down...
    M104 S0                        ; Set hotend temp to 0
    
    RESTORE_GCODE_STATE NAME=LOAD_state


[gcode_macro UNLOAD_FILAMENT]
description: Parks over bucket, heats, unloads filament, and cleans nozzle
gcode:
    # Set target temperature (default is 230c if not specified)
    {% set TEMP = params.TEMP|default(230)|float %}
    # Set retraction distance (default is 50mm)
    {% set DISTANCE = params.DISTANCE|default(50)|float %}

    SAVE_GCODE_STATE NAME=UNLOAD_state
    
    # 1. Park over the purge bucket
    M117 Parking...
    NOZZLE_PARK_BUCKET
    
    # 2. Heat up hotend if it's below the target temp
    {% if printer.extruder.temperature < TEMP %}
        M117 Heating nozzle...
        M109 S{TEMP} ; Heat and wait
    {% endif %}

    # 3. Unload the filament
    M117 Unloading filament...
    M83                            ; Set extruder to relative mode
    G1 E5 F300                     ; Extrude a tiny bit to soften the tip and prevent stringing
    G1 E-{DISTANCE} F3000          ; Retract the filament fast
    
    # 4. Wipe the nozzle clean to catch any ooze from that initial 5mm extrusion
    M117 Cleaning nozzle...
    NOZZLE_CLEAN
    CLEAR_ACTIVE_SPOOL
    M117 Filament unloaded

    # 5. Turn off the heater
    M117 Cooling down...
    M104 S0                        ; Set hotend temp to 0
    RESTORE_GCODE_STATE NAME=UNLOAD_state